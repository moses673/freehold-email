# ─────────────────────────────────────────────
# Freehold Email — Docker Compose
# Run: docker compose up -d
# ─────────────────────────────────────────────

services:
  freehold-email:
    build: .
    container_name: freehold-email
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/freehold.db
    volumes:
      - freehold_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  freehold_data:
    name: freehold-email-data
